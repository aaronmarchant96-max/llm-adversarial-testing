name: LLM Red Team Suite

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  redteam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          ollama pull gemma2:2b

      - name: Run schema conflict test
        run: python3 schema_conflict_test.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: redteam-results
          path: schema_conflict_results.json
